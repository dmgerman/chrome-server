name: package-lint

on:
  push:
    paths:
      - '**.el'
      - '.github/workflows/package-lint.yml'
      - 'Makefile'
  pull_request:
    paths:
      - '**.el'
      - '.github/workflows/package-lint.yml'
      - 'Makefile'

jobs:
  lint:
    name: package-lint on Emacs ${{ matrix.emacs_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '27.2'  # Package-Requires floor
          - '28.2'
          - '29.4'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4

      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run package-lint via make
        run: make lint
